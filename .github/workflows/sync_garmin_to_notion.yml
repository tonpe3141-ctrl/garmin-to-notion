name: Running Log

on:
  schedule:
    - cron: '30 23 * * *' # Daily at 8:30 AM JST (23:30 UTC)
  workflow_dispatch:
env:
  TZ: 'America/Montreal'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Garth tokens
        uses: actions/cache@v4
        with:
          path: ~/.garth
          # ローリングキー: 毎回新しいエントリを保存し、最新キャッシュを復元する。
          # 固定キーだと古い期限切れトークンが永遠にキャッシュされ続ける問題を防ぐ。
          key: garth-tokens-${{ github.run_id }}
          restore-keys: |
            garth-tokens-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Refresh Garmin session cookies (Playwright)
        # Playwright ヘッドレスブラウザで Garmin Connect に実際にログインし、
        # JWT_WEB 等の本物のセッションクッキーと活動データを事前取得する。
        # 戦略:
        #   1. SSO 直接ログイン（新ポータル対応）
        #   2. SSO チケット + Playwright でチケット処理（フォールバック）
        # さらに /app/activities を閲覧し SPA の API コールをインターセプトして
        # /tmp/garmin_prefetch.json に活動データを保存する（Python からの 403 を回避）。
        # 失敗しても次ステップで GARTH_TOKENS_B64 にフォールバック（continue-on-error）。
        id: refresh-cookies
        continue-on-error: true
        timeout-minutes: 15
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: 200
        run: |
          pip install playwright cloudscraper -q
          playwright install chromium --with-deps 2>&1 | tail -5
          python scripts/refresh_garmin_cookies_playwright.py

      - name: Show Playwright result
        if: always()
        run: |
          if [ "${{ steps.refresh-cookies.outcome }}" = "success" ]; then
            echo "✓ Playwright ステップ成功"
          else
            echo "⚠ Playwright ステップ失敗 - GARTH_TOKENS_B64 または パスワードログインにフォールバック"
          fi
          if [ -f /tmp/garmin_session_cookies.txt ]; then
            echo "✓ Cookie ファイルあり ($(wc -c < /tmp/garmin_session_cookies.txt) bytes)"
            # JWT_WEB の有無を確認
            if grep -q "JWT_WEB" /tmp/garmin_session_cookies.txt 2>/dev/null; then
              echo "✓ JWT_WEB: あり"
            else
              echo "⚠ JWT_WEB: なし（Cookie 認証が失敗する可能性あり）"
            fi
          else
            echo "⚠ Cookie ファイルなし"
          fi

      - name: Run script
        id: run-script
        env:
          GARMIN_SESSION_COOKIES: ${{ secrets.GARMIN_SESSION_COOKIES }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: 200
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TZ: 'America/Montreal'
        run: |
          python src/ガーミン活動データ取得.py

      - name: Refresh GARTH_TOKENS_B64 secret
        # GH_PAT_SECRETS (repo secrets write 権限付き PAT) が設定されている場合のみ更新。
        # 未設定でも continue-on-error でワークフロー全体は成功する。
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠ GH_PAT_SECRETS が未設定のため自動更新をスキップします。"
            exit 0
          fi
          if [ -f /tmp/garth_fresh_tokens.txt ]; then
            gh secret set GARTH_TOKENS_B64 \
              --body "$(cat /tmp/garth_fresh_tokens.txt)" \
              --repo "$GITHUB_REPOSITORY"
            echo "✓ GARTH_TOKENS_B64 を最新トークンで更新しました。"
          else
            echo "⚠ トークンファイルが存在しません。GARTH_TOKENS_B64 は更新されていません。"
          fi
