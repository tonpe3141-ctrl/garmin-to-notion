name: Running Log

on:
  schedule:
    - cron: '30 23 * * *' # Daily at 8:30 AM JST (23:30 UTC)
  workflow_dispatch:
env:
  TZ: 'America/Montreal'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write  # GARTH_TOKENS_B64 自動更新に必要
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Garth tokens
        uses: actions/cache@v3
        with:
          path: ~/.garth
          # ローリングキー: 毎回新しいエントリを保存し、最新キャッシュを復元する。
          # 固定キーだと古い期限切れトークンが永遠にキャッシュされ続ける問題を防ぐ。
          key: garth-tokens-${{ github.run_id }}
          restore-keys: |
            garth-tokens-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run script
        id: run-script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: 200
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TZ: 'America/Montreal'
        run: |
          python src/ガーミン活動データ取得.py

      - name: Refresh GARTH_TOKENS_B64 secret
        # Garmin 認証に成功した場合、スクリプトが /tmp/garth_fresh_tokens.txt に
        # 最新トークンを書き出す。このステップはスクリプトの成否に関わらず常に実行し、
        # そのファイルを読んで GARTH_TOKENS_B64 シークレットを更新する。
        # → 次回起動時に OAuth2 トークンが有効なため exchange エンドポイントを叩かず
        #   429 レート制限を回避できる。
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/garth_fresh_tokens.txt ]; then
            gh secret set GARTH_TOKENS_B64 \
              --body "$(cat /tmp/garth_fresh_tokens.txt)" \
              --repo "$GITHUB_REPOSITORY"
            echo "✓ GARTH_TOKENS_B64 を最新トークンで更新しました。"
          else
            echo "⚠ Garmin 認証が失敗したためトークンファイルが存在しません。GARTH_TOKENS_B64 は更新されていません。"
          fi
