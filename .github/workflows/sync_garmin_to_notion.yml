name: Running Log

on:
  schedule:
    - cron: '30 23 * * *' # Daily at 8:30 AM JST (23:30 UTC)
  workflow_dispatch:
env:
  TZ: 'America/Montreal'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write  # GARTH_TOKENS_B64 自動更新に必要
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Garth tokens
        uses: actions/cache@v3
        with:
          path: ~/.garth
          key: garth-tokens-v1
          restore-keys: |
            garth-tokens-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run script
        id: run-script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: 200
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TZ: 'America/Montreal'
        run: |
          python src/ガーミン活動データ取得.py

      - name: Refresh GARTH_TOKENS_B64 secret
        # 実行成功後に ~/.garth の新鮮なトークンをシークレットに書き戻す。
        # これにより次回起動時は有効な OAuth2 トークンから始まるため
        # exchange エンドポイントへのアクセスが不要になり、429 を防ぐ。
        if: steps.run-script.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "$HOME/.garth" ] && [ "$(ls -A "$HOME/.garth" 2>/dev/null)" ]; then
            FRESH=$(python3 -c "
from garminconnect import Garmin
import os, sys
client = Garmin()
client.garth.load(os.path.expanduser('~/.garth'))
print(client.garth.dumps())
" 2>/dev/null)
            if [ -n "$FRESH" ]; then
              gh secret set GARTH_TOKENS_B64 --body "$FRESH" --repo "$GITHUB_REPOSITORY"
              echo "✓ GARTH_TOKENS_B64 を新鮮なトークンで更新しました。"
            else
              echo "⚠ トークンのダンプに失敗しました。シークレットは更新されていません。"
            fi
          else
            echo "⚠ ~/.garth が空です。シークレットは更新されていません。"
          fi
